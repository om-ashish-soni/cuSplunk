title: Potential Pass-the-Hash Attack
id: a1b2c3d4-0010-4e5f-8a9b-000000000010
status: test
description: Detects network logon (LogonType=3) with NTLM authentication from a non-standard source, potentially indicating Pass-the-Hash lateral movement.
author: cuSplunk Test Suite
date: 2024-01-01
references:
  - https://attack.mitre.org/techniques/T1550/002/
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventCode: 4624
    LogonType: "3"
  filter_domain:
    AccountName|endswith: "$"
  filter_localhost:
    src_ip:
      - "127.0.0.1"
      - "::1"
  condition: selection and not filter_domain and not filter_localhost
fields:
  - AccountName
  - AccountDomain
  - src_ip
  - ComputerName
falsepositives:
  - Normal network logons for domain-joined machines
  - File server access
level: medium
